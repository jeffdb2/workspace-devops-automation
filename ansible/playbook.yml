---
- name: Preparar ambiente Python
  hosts: vm
  become: true
  gather_facts: false
  tasks:
    - name: Instalar Python 3.9 e dependências do Ansible
      raw: |
        rm -f /usr/lib/cnf-update-db
        DEBIAN_FRONTEND=noninteractive apt-get update
        apt-get install -y python3.9 python3.9-distutils
        update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.9 1
        apt-get install -y python3-apt
        python3.9 -m pip install --upgrade pip setuptools
        cd /usr/lib/python3/dist-packages && python3.9 -c "import apt" || python3.9 -m pip install python-apt --no-binary python-apt

- name: Instalar Docker no Ubuntu
  hosts: vm
  become: true
  tasks:
    - name: Instalar dependências
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: Adicionar repositório do Docker (deb822)
      deb822_repository:
        name: docker
        types: [deb]
        uris: https://download.docker.com/linux/ubuntu
        suites: ["{{ ansible_distribution_release }}"]
        components: [stable]
        signed_by: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Atualizar cache do apt e instalar Docker
      apt:
        name: docker-ce
        state: present
        update_cache: yes

    - name: Adicionar usuário ao grupo Docker
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Iniciar e habilitar serviço Docker
      systemd:
        name: docker
        state: started
        enabled: yes
        
    - name: Executar container da aplicação Java
      docker_container:
        name: java-api
        image: iesodias/java-api:latest
        state: started
        restart_policy: always
        published_ports:
          - "8081:8081"